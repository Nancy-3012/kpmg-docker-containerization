# -----------------------------------------------------------------------
# Basic Docker Compose file — learning version
# Goal: understand services, networks, volumes, env vars, and startup order.
# (Security hardening, secrets, and resource limits removed for simplicity —
#  the production-hardened version has been simplified out of this submission for clarity.)
# -----------------------------------------------------------------------

networks:
  frontend-net:      # only frontend + api live here
    driver: bridge
  backend-net:        # only api + worker + redis live here
    driver: bridge
  internal-net:        # only api + worker + postgres live here
    driver: bridge

volumes:
  pg-data:      # keeps Postgres data even if the container is deleted
  redis-data:   # keeps Redis data even if the container is deleted

services:

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: api
    restart: unless-stopped
    ports:
      - "4000:4000"          # exposed to host so the browser can reach it
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
    networks:
      - frontend-net
      - backend-net
      - internal-net
    depends_on:               # wait for real readiness, not just "started"
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./worker
    container_name: worker
    restart: on-failure
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      REDIS_HOST: redis
    networks:
      - backend-net           # NOT on frontend-net — cannot reach frontend
      - internal-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "3000:3000"          # this is the only thing users actually visit
    networks:
      - frontend-net          # only network it's on — can't reach postgres/redis/worker
    depends_on:
      - api
